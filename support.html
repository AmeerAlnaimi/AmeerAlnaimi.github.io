<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | Ameer Alnaimi</title>
    <link rel="icon" href="favicon.ico?v=2">

    <style>
        :root {
            --bg: #0f0f13;
            --card: rgba(255,255,255,0.06);
            --card-border: rgba(255,255,255,0.12);
            --text: #eaeaea;
            --muted: #a0a0a0;
            --accent: #ffd000;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: radial-gradient(circle at top, #1a1a22, #0f0f13);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        nav {
            position: sticky;
            top: 0;
            backdrop-filter: blur(12px);
            background: rgba(15,15,19,0.7);
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem;
            border-bottom: 1px solid var(--card-border);
            z-index: 1000;
            height: 24px; /* Matches height across pages */
            align-items: center;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            opacity: 0.8;
            transition: 0.2s;
            line-height: 1;
        }

        nav a:hover {
            opacity: 1;
            color: var(--accent);
        }

        /* Keep your existing .hero, .container, .card, and .fade styles below this line */
        .hero { text-align: center; padding: 4rem 1rem 2rem; }
        .hero h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        .hero p { color: var(--muted); }
        .container { max-width: 1100px; margin: auto; padding: 2rem 1rem; }
        .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 18px; padding: 2rem; backdrop-filter: blur(10px); text-align: center; }
        .fade { opacity: 0; transform: translateY(20px); animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>

<nav>
    <a href="index.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="support.html">Support</a>
</nav>

<div class="hero fade">
    <h1>Support Me</h1>
    <p>Help fuel my developments.</p>
</div>

<div class="container">

    <div class="card fade">
        <h2>Contribute to my developments</h2>
        <p style="color: var(--muted); max-width: 600px; margin: 0 auto;">
            If you enjoy my projects and want to support my journey as a developer, 
            you can support me via Ko-fi below. Every bit helps!
        </p>
    </div>

    <div class="kofi-container fade">
        <iframe
            id="kofiframe"
            src="https://ko-fi.com/ameeralnaimi/?hidefeed=true&widget=true&embed=true&preview=true"
            style="border:none; width:100%; background: #ffffff;"
            height="712"
            title="ameeralnaimi">
        </iframe>
    </div>

</div>

<footer>
    © 2026 Ameer Alnaimi
</footer>

</body>
</html>
